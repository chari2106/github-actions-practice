name: My First Pipeline

on:
  push:
    branches:
      - deploy

jobs:
  say-hello:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Print message
        run: echo "Hello from GitHub Actions!"

      - name: Run Python file
        run: python app.py